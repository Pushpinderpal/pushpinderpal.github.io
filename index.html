<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #0f172a;

}

/* HEADER */
.header {

  margin-bottom: 20px;

/* BUTTON */
.btn {

  color: white;

/* SERVICES */

}

/* IMAGE */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* TEXT */
.card-content {
  padding: 15px;
  text-align: center;
}

.card h3 {
  margin-bottom: 8px;
}

.card p {
  color: #94a3b8;
  font-size: 14px;

/* FOOTER */

  padding: 15px;
  margin-top: 20px;
  color: #94a3b8;
}

/* MOBILE */
@media (max-width: 768px) {
  .card {
    width: 100%;
  }

  .hero h1 {

  }
}
</style>
</head>
