<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #f5f5f5;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  background: black;
  color: white;
}

/* CONTAINER */
.container {
  padding: 15px;
}

/* ROW */
.row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

/* BOX */
.box {
  width: 300px;
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* IMAGE */
.box img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

/* CONTACT */
.contact {
  text-align: center;
  padding: 20px;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 15px;
  background: black;
  color: white;
}

/* MOBILE */
@media (max-width: 768px) {
  .box {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>My Services 🚀</h1>
</div>

<div class="container">
  <div class="row">

    <div class="box">
      <h2>Service 1</h2>
      <img src="Screenshot_20260329-145000.jpg">
      <p>Best quality service for fast growth</p>
    </div>

    <div class="box">
      <h2>Service 2</h2>
      <img src="Screenshot_20260329-145100.jpg">
      <p>Increase reach and engagement</p>
    </div>

    <div class="box">
      <h2>Service 3</h2>
      <img src="Screenshot_20260329-145200.jpg">
      <p>Professional account handling</p>
    </div>

  </div>
</div>

<div class="contact">
  <h2>Contact Me</h2>
  <p>📞 99698 01345</p>
  <a href="https://wa.me/919969801345">Chat on WhatsApp</a>
</div>

<div class="footer">
  <p>© 2026 My Website</p>
</div>

</body>
</html>
