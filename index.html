<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* HEADER */
.header {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
}

/* NAVBAR */
.nav {
  display: flex;
  justify-content: center;
  background: #333;
}

.nav a {
  color: white;
  padding: 14px 20px;
  text-decoration: none;
  display: block;
}

.nav a:hover {
  background: #575757;
}

/* MAIN */
.container {
  padding: 15px;
}

.row {
  display: flex;
  flex-wrap: wrap;
}

.box {
  flex: 1 1 30%;
  background: #f4f4f4;
  margin: 10px;
  padding: 20px;
  text-align: center;
  border-radius: 10px;
}

/* IMAGE FIX */
img {
  max-width: 100%;
  height: auto;
  border-radius: 10px;
}

/* FOOTER */
.footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 10px;
}

/* 🔥 MOBILE DESIGN */
@media (max-width: 768px) {
  .nav {
    flex-direction: column;
    align-items: center;
  }

  .row {
    flex-direction: column;
  }

  .box {
    flex: 1 1 100%;
  }

  h1 {
    font-size: 22px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>My Website</h1>
  <p>Welcome to my responsive site</p>
</div>

<div class="nav">
  <a href="#">Home</a>
  <a href="#">Services</a>
  <a href="#">Contact</a>
</div>

<div class="container">
  <div class="row">
    
    <div class="box">
      <h2>Service 1</h2>
      <img src="https://via.placeholder.com/300" alt="">
      <p>Your content here</p>
    </div>

    <div class="box">
      <h2>Service 2</h2>
      <img src="https://via.placeholder.com/300" alt="">
      <p>Your content here</p>
    </div>

    <div class="box">
      <h2>Service 3</h2>
      <img src="https://via.placeholder.com/300" alt="">
      <p>Your content here</p>
    </div>

  </div>
</div>

<div class="footer">
  <p>© 2026 My Website</p>
</div>

</body>
</html>
